databases:
  - name: defect-analyzer-db
    databaseName: defect_db
    user: defect_user
    plan: free

services:
  - type: web
    name: defect-analyzer-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: defect-analyzer-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "60"
      - key: CORS_ORIGINS
        value: https://defect-analyzer-frontend.onrender.com

  - type: web
    name: defect-analyzer-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://defect-analyzer-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
